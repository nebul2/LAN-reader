name: test-and-build

# Guarantees the macOS/Windows executables stay in sync with the code: every
# push runs the same test + smoke suite AND rebuilds the app, smoke-testing the
# packaged binary. A feature added to the script that breaks the app fails here.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[gui,dev]"
      - name: Unit tests
        run: pytest -q
      # Even the offscreen Qt platform dlopens libEGL/libGL/libxkbcommon,
      # which aren't on ubuntu-latest by default.
      - name: Install Qt runtime libs (headless)
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: GUI smoke (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/gui_smoke.py

  build:
    needs: test
    # Needed so the built .app/.exe are published to a GitHub Release.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: LEM-macos
            path: dist/LEM.app
          - os: windows-latest
            artifact: LEM-windows
            path: dist/LEM
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[gui]" pyinstaller
      - name: Build app
        run: pyinstaller packaging/lem.spec --noconfirm --distpath dist --workpath build
      - name: Smoke-test the packaged app (macOS)
        if: runner.os == 'macOS'
        env:
          LEM_SMOKE: "1"
          QT_QPA_PLATFORM: offscreen
        run: ./dist/LEM.app/Contents/MacOS/LEM
      - name: Smoke-test the packaged app (Windows)
        if: runner.os == 'Windows'
        env:
          LEM_SMOKE: "1"
          QT_QPA_PLATFORM: offscreen
        run: ./dist/LEM/LEM.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
      # Zip the bundle into a single downloadable file.
      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/LEM.app LEM-macos.zip
      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/LEM/* -DestinationPath LEM-windows.zip
      # Publish the .app/.exe to a GitHub Release on every push to main
      # (rolling "latest") and to the version tag on v* tags. Persistent,
      # publicly downloadable — no login needed, unlike CI artifacts.
      - name: Publish to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: ${{ matrix.artifact }}.zip
